server:
  port: 8440
  address: 0.0.0.0

spring:
  application:
    name: gateway
  profiles:
    include: route

  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      username: nacos
      password: nacos
      discovery:
        register-enabled: true  # 开启自动注册（默认就是true）
      config:
        import-check:
          enabled: false