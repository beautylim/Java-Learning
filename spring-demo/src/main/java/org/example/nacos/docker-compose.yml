version: '3.8'
services:
  nacos:
    image: nacos-registry.cn-hangzhou.cr.aliyuncs.com/nacos/nacos-server:v3.2.0
    container_name: nacos
    environment:
      - MODE=standalone
      - JVM_XMS=256m
      - JVM_XMX=256m
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_IDENTITY_KEY=test_key
      - NACOS_AUTH_IDENTITY_VALUE=test_value
      # ✅ 这是 32 字节 = 256bit 完美密钥！解决 JWT 报错！
      - NACOS_AUTH_TOKEN=MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
    ports:
      - "8848:8848"
      - "8080:8080"   # 控制台端口已映射！Windows可访问
      - "9848:9848"
      - "9849:9849"
    restart: always