server:
  port: 8442
  address: 0.0.0.0

spring:
  application:
    name: product

  cloud:
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
        register-enabled: true  # 开启自动注册（默认就是true）
    sentinel:
      transport:
        dashboard: localhost:8858
      eager: true



  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shop?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: 123456
    type: com.zaxxer.hikari.HikariDataSource

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: org.example.product.model.entity
  configuration:
    map-underscore-to-camel-case: true