server:
  port: 8441
  address: 0.0.0.0

spring:
  application:
    name: order

  profiles:
    active: test
    include: feign

  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      username: nacos
      password: nacos
      discovery:
        register-enabled: true  # 开启自动注册（默认就是true）
      config:
        import-check:
          enabled: false
        namespace: ${spring.profiles.active:dev}

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shop?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: 123456
    type: com.zaxxer.hikari.HikariDataSource


mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: org.example.order.model.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    org.example.order.feign: debug
---
spring:
  config:
    import:
      - nacos:common.yaml?group=order
      - nacos:database.yaml?group=order
    activate:
      on-profile: dev


---
spring:
  config:
    import:
      - nacos:common.yaml?group=order
      - nacos:database.yaml?group=order
      - nacos:haha.yaml?group=order
    activate:
      on-profile: test